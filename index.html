<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>JumpTest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ===== Dashboard design system (typeui.sh) ===== */
      :root {
        color-scheme: light;

        /* brand — Blue 600 accent */
        --brand: #2563eb;
        --brand-2: #3b82f6;
        --brand-strong: #1d4ed8;
        --brand-grad: #2563eb;
        --brand-soft: #eff6ff;
        --brand-ring: rgba(37, 99, 235, 0.32);

        /* semantic tokens — used sparingly, as dots/text only */
        --success: #16a34a;
        --warning: #d97706;
        --danger: #dc2626;

        /* surfaces — light, high contrast */
        --color-app-bg: #f8fafc;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f1f5f9;
        --color-background-tertiary: #e2e8f0;

        /* (kept for compatibility) */
        --panel-bg: #ffffff;
        --panel-border: #e2e8f0;

        /* borders — crisp 1px lines */
        --color-border-primary: #eef2f6;
        --color-border-tertiary: #e2e8f0;

        /* text */
        --color-text-primary: #0f172a;
        --color-text-secondary: #475569;
        --color-text-tertiary: #64748b;

        /* ink = the top nav / brand panels (now light) */
        --ink: #ffffff;
        --ink-2: #f8fafc;
        --on-ink: #0f172a;
        --on-ink-dim: #64748b;
        --ink-border: #e2e8f0;

        /* elevation — soft, subtle shadows */
        --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.06);
        --shadow-md: 0 4px 14px rgba(15, 23, 42, 0.08);
        --shadow-lg: 0 18px 44px rgba(15, 23, 42, 0.16);
        --shadow-brand: 0 1px 2px rgba(15, 23, 42, 0.06);

        /* radii — sm 4 / md 8 */
        --r-sm: 4px;
        --r-input: 8px;
        --r-card: 8px;
        --r-modal: 12px;

        /* type — IBM Plex Sans throughout */
        --font-display: 'IBM Plex Sans', system-ui, sans-serif;
        --font-body: 'IBM Plex Sans', system-ui, sans-serif;
        --font-mono: 'IBM Plex Sans', ui-monospace, monospace;
      }

      * { box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body {
        margin: 0;
        font-family: var(--font-body);
        background: var(--color-app-bg);
        color: var(--color-text-primary);
        -webkit-font-smoothing: antialiased;
        font-size: 14px;
      }

      h1, h2, h3 { font-family: var(--font-display); letter-spacing: -0.01em; }

      /* numeric displays read as tabular */
      .tnum { font-variant-numeric: tabular-nums; }

      input, select, textarea, button { font-family: inherit; }
      input:focus, select:focus, textarea:focus {
        border-color: var(--brand) !important;
        box-shadow: 0 0 0 3px var(--brand-ring);
      }
      input::placeholder, textarea::placeholder { color: var(--color-text-tertiary); }

      /* visible keyboard focus for WCAG 2.2 AA */
      :focus-visible {
        outline: 2px solid var(--brand);
        outline-offset: 2px;
      }
      button:focus:not(:focus-visible) { outline: none; }

      button {
        transition: transform 0.08s ease, filter 0.15s ease,
          box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      }
      button:not(:disabled):hover { filter: brightness(1.08); }
      button:not(:disabled):active { transform: translateY(1px) scale(0.99); }

      a { color: var(--brand-2); }

      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb {
        background: var(--color-background-tertiary);
        border-radius: 999px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::selection { background: var(--brand-ring); }

      .grid-dots {
        background-image: radial-gradient(rgba(255, 255, 255, 0.07) 1px, transparent 1px);
        background-size: 16px 16px;
      }

      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
      @keyframes toastIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: none; } }
      @keyframes pop { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
      @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      .anim-overlay { animation: fadeIn 0.15s ease; }
      .anim-modal { animation: slideUp 0.22s cubic-bezier(0.2, 0.7, 0.3, 1); }
      .anim-toast { animation: toastIn 0.25s cubic-bezier(0.2, 0.7, 0.3, 1); }
      .anim-in { animation: slideUp 0.3s ease both; }
      .anim-pop { animation: pop 0.2s cubic-bezier(0.2, 0.8, 0.3, 1.2); }
      .floaty { animation: floaty 5s ease-in-out infinite; }

      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; transition: none !important; }
      }
      @media (max-width: 680px) { .auth-brand { display: none !important; } }

      .app-shell {
        display: grid;
        grid-template-columns: 232px minmax(0, 1fr) 312px;
        gap: 16px;
        align-items: start;
        max-width: 1480px;
        margin: 0 auto;
        padding: 24px 22px 72px;
      }
      .shell-aside { position: sticky; top: 78px; }
      @media (max-width: 1200px) {
        .app-shell { grid-template-columns: 220px minmax(0, 1fr); }
        .shell-right { display: none; }
      }
      @media (max-width: 860px) {
        .app-shell { grid-template-columns: 1fr; padding: 20px 16px 64px; }
        .shell-left { display: none; }
        .shell-aside { position: static; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
