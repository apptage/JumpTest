<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GammaQuality</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* brand — black & orange */
        --brand: #ff6a1a;
        --brand-2: #ff9a3c;
        --brand-strong: #f24e00;
        --brand-grad: linear-gradient(135deg, #ff8a1f 0%, #ff5400 100%);
        --brand-soft: rgba(255, 106, 26, 0.12);
        --brand-ring: rgba(255, 106, 26, 0.4);

        /* ink (the "black" half — used for header, brand panels) */
        --ink: #0c0d11;
        --ink-2: #15171d;
        --ink-3: #1d2027;
        --on-ink: #f5f5f4;
        --on-ink-dim: #9ca1ab;
        --ink-border: rgba(255, 255, 255, 0.09);

        /* surfaces (light) */
        --color-app-bg: #f5f5f4;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f3f3f1;
        --color-background-tertiary: #e9e8e5;

        /* borders */
        --color-border-primary: #edece9;
        --color-border-tertiary: #e0ded9;

        /* text */
        --color-text-primary: #14151a;
        --color-text-secondary: #6b6f76;
        --color-text-tertiary: #9a9ea6;

        /* elevation */
        --shadow-sm: 0 1px 2px rgba(12, 13, 17, 0.06);
        --shadow-md: 0 6px 22px rgba(12, 13, 17, 0.09);
        --shadow-lg: 0 22px 55px rgba(12, 13, 17, 0.28);
        --shadow-brand: 0 6px 18px rgba(255, 90, 0, 0.34);

        /* radii (intentionally varied) */
        --r-input: 9px;
        --r-card: 12px;
        --r-modal: 16px;

        /* type */
        --font-display: 'Space Grotesk', system-ui, sans-serif;
        --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
        --font-body: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --color-app-bg: #0a0b0e;
          --color-background-primary: #14161b;
          --color-background-secondary: #1b1e25;
          --color-background-tertiary: #24272f;
          --color-border-primary: #23262d;
          --color-border-tertiary: #2e323b;
          --color-text-primary: #f2f3f5;
          --color-text-secondary: #9aa0aa;
          --color-text-tertiary: #6b7079;
          --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.5);
          --shadow-md: 0 6px 22px rgba(0, 0, 0, 0.5);
          --shadow-lg: 0 22px 55px rgba(0, 0, 0, 0.65);
        }
      }

      * { box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body {
        margin: 0;
        font-family: var(--font-body);
        background:
          radial-gradient(1100px 520px at 50% -220px, var(--brand-soft), transparent 70%),
          var(--color-app-bg);
        color: var(--color-text-primary);
        -webkit-font-smoothing: antialiased;
      }

      h1, h2, h3 { font-family: var(--font-display); letter-spacing: -0.02em; }

      input, select, textarea, button { font-family: inherit; }
      input:focus, select:focus, textarea:focus {
        border-color: var(--brand) !important;
        box-shadow: 0 0 0 3px var(--brand-ring);
      }
      input::placeholder, textarea::placeholder { color: var(--color-text-tertiary); }

      button {
        transition: transform 0.08s ease, filter 0.15s ease,
          box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      }
      button:not(:disabled):hover { filter: brightness(1.06); }
      button:not(:disabled):active { transform: translateY(1px) scale(0.99); }

      a { color: var(--brand); }

      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb {
        background: var(--color-border-tertiary);
        border-radius: 999px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::selection { background: var(--brand-ring); }

      /* dotted grid for techie dark panels */
      .grid-dots {
        background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        background-size: 16px 16px;
      }

      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: none; }
      }
      @keyframes toastIn {
        from { opacity: 0; transform: translateX(16px); }
        to { opacity: 1; transform: none; }
      }
      @keyframes pop { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
      @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      .anim-overlay { animation: fadeIn 0.15s ease; }
      .anim-modal { animation: slideUp 0.22s cubic-bezier(0.2, 0.7, 0.3, 1); }
      .anim-toast { animation: toastIn 0.25s cubic-bezier(0.2, 0.7, 0.3, 1); }
      .anim-in { animation: slideUp 0.3s ease both; }
      .anim-pop { animation: pop 0.2s cubic-bezier(0.2, 0.8, 0.3, 1.2); }
      .floaty { animation: floaty 5s ease-in-out infinite; }

      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; transition: none !important; }
      }
      @media (max-width: 680px) {
        .auth-brand { display: none !important; }
      }

      /* dashboard app shell — 3 columns on wide screens */
      .app-shell {
        display: grid;
        grid-template-columns: 232px minmax(0, 1fr) 312px;
        gap: 20px;
        align-items: start;
        max-width: 1480px;
        margin: 0 auto;
        padding: 24px 22px 72px;
      }
      .shell-aside { position: sticky; top: 78px; }
      @media (max-width: 1200px) {
        .app-shell { grid-template-columns: 220px minmax(0, 1fr); }
        .shell-right { display: none; }
      }
      @media (max-width: 860px) {
        .app-shell { grid-template-columns: 1fr; padding: 20px 16px 64px; }
        .shell-left { display: none; }
        .shell-aside { position: static; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
