<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>JumpTest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ===== JumpTest Design System — periwinkle #6C63FF on a soft blue-gray
         canvas, Geist type, 16px cards, periwinkle-tinted shadows.
         (claude.ai/design handoff bundle: jumptest-design-system) ===== */
      :root {
        color-scheme: light;

        /* brand — periwinkle */
        --brand: #6c63ff;
        --brand-2: #8b84ff;
        --brand-strong: #574fd6;
        --brand-grad: #6c63ff;
        --brand-gradient: linear-gradient(135deg, #8078ff 0%, #6c63ff 100%);
        --brand-soft: #f0efff;
        --brand-ring: rgba(108, 99, 255, 0.32);

        /* semantic tokens — used as dots, pills and thin bars, never large blocks */
        --success: #22c55e;
        --warning: #f59e0b;
        --danger: #ff6b6b;
        --info: #6c63ff;
        --purple: #6c63ff;
        --cyan: #06b6d4;

        /* surfaces — soft blue-gray canvas, white cards */
        --color-app-bg: #f0f1f7;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f0f1f7;
        --color-background-tertiary: #e4e6ef;

        /* (kept for compatibility) */
        --panel-bg: #ffffff;
        --panel-border: #e4e6ef;

        /* borders */
        --color-border-primary: #edeef4;
        --color-border-tertiary: #e4e6ef;

        /* text */
        --color-text-primary: #1a1d2e;
        --color-text-secondary: #6b7280;
        --color-text-tertiary: #9ca3af;

        /* ink = the top header / brand panels */
        --ink: #ffffff;
        --ink-2: #f0f1f7;
        --on-ink: #1a1d2e;
        --on-ink-dim: #6b7280;
        --ink-border: #e4e6ef;

        /* sidebar — translucent frosted panel with a dark active pill */
        --sidebar-surface: rgba(255, 255, 255, 0.5);
        --sidebar-border: rgba(0, 0, 0, 0.06);
        --sidebar-foreground: #101828;
        --sidebar-active: #2a2d3e;
        --sidebar-active-fg: #ffffff;

        /* soft-pill tones */
        --tone-danger-bg: #fef2f2;   --tone-danger-fg: #b91c1c;
        --tone-warning-bg: #fffbeb;  --tone-warning-fg: #b45309;
        --tone-success-bg: #ecfdf5;  --tone-success-fg: #047857;
        --tone-info-bg: #f0efff;     --tone-info-fg: #6c63ff;
        --tone-neutral-bg: #f0f1f7;  --tone-neutral-fg: #6b7280;

        /* elevation — soft with a faint periwinkle tint */
        --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.07), 0 4px 14px rgba(108, 99, 255, 0.07);
        --shadow-md: 0 4px 18px rgba(108, 99, 255, 0.10);
        --shadow-lg: 0 8px 32px rgba(108, 99, 255, 0.18);
        --shadow-brand: 0 1px 2px rgba(108, 99, 255, 0.22);
        --shadow-hover: 0 8px 24px -6px rgba(108, 99, 255, 0.22);

        /* radii — controls 10, cards & modals 16, pills full */
        --r-sm: 8px;
        --r-input: 10px;
        --r-card: 16px;
        --r-modal: 16px;
        --r-pill: 999px;

        /* type — Geist */
        --font-display: 'Geist', system-ui, -apple-system, sans-serif;
        --font-body: 'Geist', system-ui, -apple-system, sans-serif;
        --font-mono: 'Geist Mono', ui-monospace, monospace;

        --text-page-title: 28px;
        --text-stat-xl: 28px;
        --text-stat-lg: 20px;
        --text-heading: 16px;
        --text-base: 14px;
        --text-body: 13px;
        --text-sm: 12px;
        --text-xs: 11px;
        --text-2xs: 10.5px;

        --tracking-tight: -0.02em;
        --tracking-snug: -0.01em;
        --tracking-label: 0.06em;
        --leading-body: 1.55;
        --leading-tight: 1.2;

        /* layout */
        --header-h: 58px;
        --rail-width: 244px;
      }

      * { box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body {
        margin: 0;
        font-family: var(--font-body);
        background:
          radial-gradient(1100px 560px at 18% -12%, #dde6f2 0%, rgba(221, 230, 242, 0) 60%),
          linear-gradient(162deg, #eaedf5 0%, #f0f1f7 52%, #ece9f6 100%);
        background-attachment: fixed;
        color: var(--color-text-primary);
        -webkit-font-smoothing: antialiased;
        font-size: var(--text-base);
      }

      h1, h2, h3 { font-family: var(--font-display); letter-spacing: var(--tracking-snug); }

      /* numeric displays read as tabular */
      .tnum { font-variant-numeric: tabular-nums; }

      input, select, textarea, button { font-family: inherit; }
      input:focus, select:focus, textarea:focus {
        border-color: var(--brand) !important;
        box-shadow: 0 0 0 3px var(--brand-ring);
      }
      input::placeholder, textarea::placeholder { color: var(--color-text-tertiary); }

      /* visible keyboard focus for WCAG 2.2 AA */
      :focus-visible {
        outline: 2px solid var(--brand);
        outline-offset: 2px;
      }
      button:focus:not(:focus-visible) { outline: none; }

      button {
        transition: transform 0.08s ease, filter 0.15s ease,
          box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      }
      button:not(:disabled):hover { filter: brightness(1.08); }
      button:not(:disabled):active { transform: translateY(1px) scale(0.99); }

      a { color: var(--brand); text-decoration: none; }
      a:hover { color: var(--brand-strong); text-decoration: underline; }

      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb {
        background: var(--color-background-tertiary);
        border-radius: 999px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::selection { background: var(--brand-ring); }

      .grid-dots {
        background-image: radial-gradient(rgba(255, 255, 255, 0.07) 1px, transparent 1px);
        background-size: 16px 16px;
      }

      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
      @keyframes toastIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: none; } }
      @keyframes pop { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
      @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      .anim-overlay { animation: fadeIn 0.15s ease; }
      .anim-modal { animation: slideUp 0.22s cubic-bezier(0.2, 0.7, 0.3, 1); }
      .anim-toast { animation: toastIn 0.25s cubic-bezier(0.2, 0.7, 0.3, 1); }
      .anim-in { animation: slideUp 0.3s ease both; }
      .anim-pop { animation: pop 0.2s cubic-bezier(0.2, 0.8, 0.3, 1.2); }
      .floaty { animation: floaty 5s ease-in-out infinite; }

      /* manager dashboard interactions */
      .mgr-row { transition: background 0.12s ease; }
      .mgr-row:hover { background: var(--color-background-secondary); }
      .mgr-card { transition: box-shadow 0.15s ease, transform 0.15s ease, border-color 0.15s ease; }
      .mgr-card.clickable:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); border-color: var(--color-border-tertiary); }

      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; transition: none !important; }
      }
      @media (max-width: 680px) { .auth-brand { display: none !important; } }

      /* multi-page nav layout — translucent frosted rail, dark active pill */
      .nav-layout { display: flex; min-height: 100vh; gap: 0; padding: 14px 14px 0; }
      .nav-rail {
        width: var(--rail-width);
        flex-shrink: 0;
        background: var(--sidebar-surface);
        border: 1px solid var(--sidebar-border);
        border-radius: 18px;
        padding: 16px 14px;
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        position: sticky;
        top: calc(var(--header-h) + 14px);
        height: calc(100vh - var(--header-h) - 28px);
        overflow-y: auto;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 11px;
        padding: 9px 12px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        background: transparent;
        color: var(--color-text-secondary);
        width: 100%;
        text-align: left;
        transition: background 0.12s ease, color 0.12s ease;
      }
      .nav-item:hover { background: rgba(108, 99, 255, 0.08); color: var(--color-text-primary); }
      .nav-item.on { background: var(--sidebar-active); color: var(--sidebar-active-fg); font-weight: 600; }
      .nav-item.on:hover { background: var(--sidebar-active); color: var(--sidebar-active-fg); }
      .nav-item.on:not(:disabled):hover { filter: none; }
      .nav-main { flex: 1; min-width: 0; }
      .page-area { max-width: 1500px; margin: 0 auto; padding: 20px 22px 72px; }
      @media (max-width: 860px) {
        .nav-layout { flex-direction: column; padding: 10px 10px 0; }
        .nav-rail {
          width: auto;
          height: auto;
          position: static;
          flex-direction: row;
          align-items: center;
          gap: 6px;
          overflow-x: auto;
          padding: 8px;
          border-radius: 14px;
        }
        .nav-item { width: auto; white-space: nowrap; }
        .page-area { padding: 16px; }
      }

      /* team-lead analytics 2-column workspace (70/30) with sticky sidebar */
      .an-workspace {
        display: grid;
        grid-template-columns: minmax(0, 7fr) minmax(0, 3fr);
        gap: 16px;
        align-items: start;
      }
      .an-side {
        position: sticky;
        top: 78px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      @media (max-width: 1000px) {
        .an-workspace { grid-template-columns: 1fr; }
        .an-side { position: static; }
      }

      .app-shell {
        display: grid;
        grid-template-columns: 232px minmax(0, 1fr) 312px;
        gap: 16px;
        align-items: start;
        max-width: 1320px;
        margin: 0 auto;
        padding: 24px 22px 72px;
      }
      .shell-aside { position: sticky; top: 78px; }
      @media (max-width: 1200px) {
        .app-shell { grid-template-columns: 220px minmax(0, 1fr); }
        .shell-right { display: none; }
      }
      @media (max-width: 860px) {
        .app-shell { grid-template-columns: 1fr; padding: 20px 16px 64px; }
        .shell-left { display: none; }
        .shell-aside { position: static; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
